; platformio.ini — Configuración de PlatformIO para el firmware iHealth32
; =========================================================================
; PlatformIO es la herramienta que compila el código C++ y lo sube al ESP32.
; Este archivo le dice qué placa usar, qué librerías instalar y qué archivos
; compilar.
;
; El proyecto tiene dos entornos (dos modos de compilación):
;   produccion — todos los sensores son reales: MAX30100 (BPM/SpO2),
;                MAX30205 (Temp) y AD8232 (ECG). Es el firmware definitivo.  [DEFAULT]
;   testing    — solo el BPM es real (MAX30100); SpO2, Temp y ECG se generan
;                de forma sintética. Útil para probar la RNA sin tener todos
;                los sensores conectados a la vez.
;
; Comandos habituales (ejecutar desde la carpeta del proyecto):
;   pio run --target upload              → compila el entorno activo y lo sube al ESP32
;   pio run -e testing --target upload   → cambia a testing y lo sube
;   pio run -e produccion --target upload → cambia a produccion y lo sube
;   pio device monitor                   → abre el monitor serie (115200 baudios)
;
; Para cambiar el entorno por defecto, edita la línea "default_envs" más abajo.

[platformio]
src_dir      = src
default_envs = produccion

; ── Configuración compartida por ambos entornos ──────────────────────────────
; Todo lo que está aquí se aplica igual a produccion y a testing.
[base]
platform  = espressif32   ; familia de chips del ESP32
board     = esp32dev      ; placa genérica ESP32 con 4 MB de flash
framework = arduino       ; API de Arduino: setup(), loop(), digitalRead(), Serial...

monitor_speed = 115200    ; velocidad del puerto serie en baudios — debe coincidir con Serial.begin()
monitor_port  = COM8      ; puerto USB donde está conectado el ESP32 actualmente
upload_port   = COM8      ; mismo puerto para subir el firmware

; extra_scripts ejecuta scripts/patch.py antes de cada compilación.
; Ese script corrige automáticamente un bug de compatibilidad en la librería
; TFLite_ESP32 con compiladores GCC >= 8.x (ver scripts/patch.py para más detalles).
extra_scripts = pre:scripts/patch.py

lib_deps =
    tanakamasayuki/TensorFlowLite_ESP32 @ ^1.0.0           ; TFLite Micro para ESP32 (inferencia de la RNA)
    https://github.com/mathieucarbou/ESPAsyncWebServer.git  ; servidor web asíncrono (no bloquea el loop)
    https://github.com/mathieucarbou/AsyncTCP.git           ; TCP asíncrono, requerido por ESPAsyncWebServer
    https://github.com/oxullo/Arduino-MAX30100.git#1.2.1     ; driver MAX30100 (BPM/SpO2); usado por Oximetro_MAX30100

build_flags =
    -DCORE_DEBUG_LEVEL=0       ; desactiva mensajes internos del ESP-IDF (reduce ruido en el monitor serie)
    -DTF_LITE_STATIC_MEMORY=1  ; TFLite usa memoria estática en vez de malloc, obligatorio en ESP32
    -I${PROJECT_INCLUDE_DIR}   ; añade include/ al path de búsqueda (necesario para normalizacion.h y modelo_vitales_data.h)

; ── Entorno de producción (todos los sensores reales) ────────────────────────
; build_src_filter indica qué archivo de src/ compilar.
; "-<*>" excluye todo; "+<main.cpp>" incluye solo ese archivo.
; Así evitamos que main.cpp y main-test.cpp se compilen a la vez (tendrían
; funciones duplicadas como setup() y loop() y daría error de enlazado).
[env:produccion]
extends          = base
build_src_filter = -<*> +<main.cpp>

; ── Entorno de testing (BPM real, SpO2/Temp/ECG sintéticos) ──────────────────
; Compila src/main-test.cpp en lugar de src/main.cpp.
; Para simular una condición clínica concreta (fiebre, hipoxia, etc.),
; edita las constantes TEST_*_TARGET al principio de main-test.cpp y vuelve a subir.
[env:testing]
extends          = base
build_src_filter = -<*> +<main-test.cpp>
